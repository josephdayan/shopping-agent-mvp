services:
  postgres:
    image: postgres:16-alpine
    container_name: shopping-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopping_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopping_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
